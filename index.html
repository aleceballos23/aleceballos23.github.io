<!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ale's Games</title>
  <meta name="description" content="Free iPhone games made by a 17-year-old. Toast! and Glop - download free on the App Store." />
  <meta property="og:title" content="Ale's Games" />
  <meta property="og:description" content="Free iPhone games made by a 17-year-old. Play Toast! and Glop." />
  <meta name="theme-color" content="#6f5be0" />
  <style>
  :root{--toast1:#ffb347;--toast2:#ff8a3d;--glop1:#8b6ff0;--glop2:#f19bd6;--ink:#1c1830;--muted:#6b6685;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);min-height:100%;background:linear-gradient(160deg,#fff4e6 0%,#f4ecff 55%,#ffe9f6 100%);display:flex;justify-content:center;padding:38px 20px 60px;}
  .wrap{width:100%;max-width:440px;text-align:center}
.logo{width:96px;height:96px;margin:0 auto 16px;border-radius:26px;background:linear-gradient(135deg,var(--glop1),var(--toast2));display:flex;align-items:center;justify-content:center;font-size:52px;box-shadow:0 12px 34px rgba(111,91,224,.32);}
h1{font-size:30px;letter-spacing:.3px;margin-bottom:4px}
.tag{color:var(--muted);font-size:15px;margin-bottom:30px}
.tag b{color:var(--ink)}
.card{display:flex;align-items:center;gap:16px;text-decoration:none;color:#fff;padding:18px 20px;border-radius:22px;margin-bottom:16px;text-align:left;box-shadow:0 10px 26px rgba(0,0,0,.14);transition:transform .12s ease,box-shadow .12s ease;position:relative;overflow:hidden;}
.card:active{transform:scale(.98)}
  .card .ic{width:60px;height:60px;border-radius:16px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:34px;background:rgba(255,255,255,.22)}
.card .t{flex:1}
.card .t .n{font-size:20px;font-weight:800;line-height:1.1}
.card .t .d{font-size:13px;opacity:.92;margin-top:3px}
.card .cta{font-size:13px;font-weight:800;background:rgba(255,255,255,.95);color:var(--ink);padding:9px 14px;border-radius:999px;white-space:nowrap}
.toast{background:linear-gradient(135deg,var(--toast1),var(--toast2))}
.glop{background:linear-gradient(135deg,var(--glop1),var(--glop2))}
  .soon .cta{background:rgba(255,255,255,.35);color:#fff}
.socials{display:flex;justify-content:center;gap:14px;margin:26px 0 10px}
.socials a{width:46px;height:46px;border-radius:14px;background:#fff;box-shadow:0 6px 16px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;font-size:20px;text-decoration:none}
.follow{color:var(--muted);font-size:13px;margin-bottom:22px}
footer{color:#a49fbb;font-size:12px;margin-top:18px}
  @media (prefers-color-scheme:dark){body{background:linear-gradient(160deg,#2a2140,#1a1730 60%,#2a1a2c);color:#f3f0ff}.tag,.follow,footer{color:#b7b0d6}.tag b{color:#fff}.socials a{background:#2c2646}}
</style>
  </head>
  <body>
<div class="wrap">
  <div class="logo">🎮</div>
<h1>Ale's Games</h1>
  <p class="tag">free iPhone games made by a <b>17-year-old</b> 🍞🟢</p>
<a class="card toast" href="https://apps.apple.com/app/id6769624271">
<div class="ic">🍞</div>
<div class="t"><div class="n">Toast!</div><div class="d">the cozy block-puzzle breakfast</div></div>
<div class="cta">GET FREE</div>
</a>
<a class="card glop soon" href="https://apps.apple.com/app/id6782182260">
  <div class="ic">🟢</div>
<div class="t"><div class="n">Glop</div><div class="d">eat · grow · evolve - the cutest .io game</div></div>
<div class="cta">SOON</div>
</a>
<p class="follow">follow the journey 👇</p>
<div class="socials">
<a href="https://www.tiktok.com/@alesgames" aria-label="TikTok">🎵</a>
<a href="https://www.instagram.com/alesgames" aria-label="Instagram">📸</a>
<a href="https://www.youtube.com/@alesgames" aria-label="YouTube">▶️</a>
</div>
<footer>© 2026 Ale's Games</footer>
</div>
</body>
</html>
